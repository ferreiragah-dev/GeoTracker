<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b0f17" />
  <title>GeoTracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section id="loginScreen" class="screen login-screen active" aria-label="Login screen">
      <div class="login-card">
        <h1 class="login-title">GeoTracker</h1>
        <p class="login-subtitle">Secure mission access</p>

        <form id="loginForm" class="login-form" autocomplete="on">
          <label class="field-label" for="email">Email</label>
          <input id="email" name="email" type="email" class="text-input" placeholder="you@example.com" required />

          <label class="field-label" for="password">Password</label>
          <input id="password" name="password" type="password" class="text-input" placeholder="********" required />

          <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <p id="loginStatus" class="auth-status" role="status" aria-live="polite"></p>

        <div class="auth-footer">
          <button id="forgotPasswordLink" class="link-btn" type="button">Esqueci a senha</button>
          <button id="goToRegister" class="link-btn" type="button">Criar conta</button>
        </div>
      </div>
    </section>

    <section id="registerScreen" class="screen login-screen" aria-label="Register screen">
      <div class="login-card">
        <h1 class="login-title">Create Account</h1>
        <p class="login-subtitle">Register to start location tracking</p>

        <form id="registerForm" class="login-form" autocomplete="on">
          <label class="field-label" for="firstName">Nome</label>
          <input id="firstName" name="firstName" type="text" class="text-input" placeholder="Gabriel" required />

          <label class="field-label" for="lastName">Sobrenome</label>
          <input id="lastName" name="lastName" type="text" class="text-input" placeholder="Sodexo" required />

          <label class="field-label" for="registerEmail">Email</label>
          <input id="registerEmail" name="registerEmail" type="email" class="text-input" placeholder="you@example.com" required />

          <label class="field-label" for="registerPassword">Senha</label>
          <input id="registerPassword" name="registerPassword" type="password" class="text-input" placeholder="Min. 6 caracteres" required />

          <button type="submit" class="btn btn-success">Criar conta</button>
        </form>

        <p id="registerStatus" class="auth-status" role="status" aria-live="polite"></p>

        <div class="auth-footer">
          <span>Already have an account?</span>
          <button id="backToLogin" class="link-btn" type="button">Back to login</button>
        </div>
      </div>
    </section>

    <section id="mainScreen" class="screen main-screen" aria-label="Tracking screen">
      <header class="top-bar">
        <button id="menuButton" class="icon-button" aria-label="Open menu" type="button">Menu</button>
        <h2 class="top-title">Tracking</h2>

        <label class="switch" aria-label="Tracking toggle">
          <input id="trackingToggle" type="checkbox" checked />
          <span class="slider"></span>
        </label>

        <div class="avatar" aria-label="User avatar">GS</div>
      </header>

      <div id="map" class="map"></div>

      <section class="bottom-card" aria-label="Mission tracking card">
        <h3>Live Mission Tracking</h3>
        <p id="circleText">Sem circulo selecionado.</p>
        <p id="statusText">Ready to share your location.</p>
        <button id="startBtn" class="btn btn-success" type="button">Start Sharing Location</button>
      </section>
    </section>

    <aside id="menuPanel" class="menu-panel" aria-label="Main menu">
      <div class="menu-header">
        <h3>Menu</h3>
        <button id="closeMenuButton" class="icon-button" type="button">Fechar</button>
      </div>

      <button id="createCircleMenuBtn" class="btn btn-success" type="button">Criar circulo</button>
      <button id="refreshCirclesBtn" class="btn btn-primary menu-btn" type="button">Atualizar circulos</button>

      <div class="menu-section">
        <h4>Meus circulos</h4>
        <ul id="circleList" class="circle-list"></ul>
      </div>
    </aside>

    <div id="menuBackdrop" class="menu-backdrop" aria-hidden="true"></div>

    <section id="circleModal" class="circle-modal" aria-label="Create circle modal">
      <div class="circle-modal-card">
        <div class="menu-header">
          <h3>Criar circulo</h3>
          <button id="closeCircleModalBtn" class="icon-button" type="button">Fechar</button>
        </div>

        <form id="createCircleForm" class="login-form" autocomplete="off">
          <label class="field-label" for="circleNameInput">Nome do circulo</label>
          <input
            id="circleNameInput"
            name="circleNameInput"
            class="text-input"
            type="text"
            placeholder="Ex: Familia Centro"
            maxlength="120"
            required
          />
          <button class="btn btn-success" type="submit">Criar</button>
        </form>

        <p id="circleModalStatus" class="auth-status" role="status" aria-live="polite"></p>

        <div id="inviteLinkBox" class="invite-link-box hidden">
          <label class="field-label" for="inviteLinkInput">Link de convite</label>
          <input id="inviteLinkInput" class="text-input" type="text" readonly />
          <button id="copyInviteLinkBtn" class="btn btn-primary" type="button">Copiar link</button>
        </div>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
